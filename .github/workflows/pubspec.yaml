name: screen_translator
description: 屏幕实时中英互译翻译APP - 悬浮球开关控制、屏幕文字识别、实时翻译

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.2
  google_mlkit_text_recognition: ^0.12.0
  dio: ^5.7.0
  sqflite: ^2.3.3+1
  path: ^1.8.3
  shared_preferences: ^2.3.4
  flutter_tts: ^3.9.3
  connectivity_plus: ^6.0.3
  image: ^4.2.0
  crypto: ^3.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/dict/
